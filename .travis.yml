language: node_js
node_js: stable
sudo: false
script:
  - npm test
install:
  - npm install
after_success:
  - deploy:
    provider: pages
    skip_cleanup: true
    github_token: $GH_TOKEN
    keep_history: true
    repo: katydecorah/staging
    on:
      branch: master
  - npm run lh -- https://katydecorah.example.com/staging/
